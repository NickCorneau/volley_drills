name: App CI

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  push:
    paths:
      - "app/**"
      - ".github/workflows/app-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Type-check and build
        run: npm run build

      - name: Check formatting
        run: npx prettier --check .

  e2e-chromium:
    # Chromium-only e2e smoke + WCAG 2.1 AA axe-core checks against the
    # production build. See docs/specs/m001-quality-and-testing.md and
    # docs/research/minimum-viable-test-stack.md.
    runs-on: ubuntu-latest
    needs: build-and-lint
    defaults:
      run:
        shell: bash
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (Chromium)
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 14
